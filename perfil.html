<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perfil - CLM Puente Piedra</title>
  <link rel="icon" type="image/png" href="LOGOCLM.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/perfil.css"/>
  <!-- jsPDF para descargar PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { visibility: hidden; }
    body.auth-ok { visibility: visible; }
  </style>
</head>
<body>

<div id="loaderOverlay">
  <div class="loader-ring">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="gradLoader" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#C9A84C"/>
          <stop offset="100%" stop-color="#E8C97A"/>
        </linearGradient>
      </defs>
      <circle cx="50" cy="50" r="45"/>
    </svg>
    <div class="loader-logo"><img src="LOGOCLM.png" alt="CLM"/></div>
  </div>
  <span class="loader-txt" id="loaderTxt">Cargando...</span>
</div>

<header>
  <div class="header-inner">
    <a href="index.html" class="header-brand">
      <img src="LOGOCLM.png" class="logo-cross" alt="CLM"/>
      <div class="header-text">
        <h1>CLM Puente Piedra</h1>
        <p>Base de Datos de la Iglesia</p>
      </div>
    </a>
    <nav class="header-nav" id="headerNav">
      <a href="index.html"       class="nav-link nav-link--active">Miembros</a>
      <a href="dashboard.html"   class="nav-link">Dashboard</a>
      <a href="ministerios.html" class="nav-link">Ministerios</a>
      <a href="tipos.html"       class="nav-link">Tipos</a>
      <a href="eventos.html"     class="nav-link">Eventos</a>
      <a href="finanzas.html"    class="nav-link finanzas-link">Finanzas</a>
      <a href="usuarios.html"    class="nav-link usuarios-link">Usuarios</a>
    </nav>
    <div class="header-right">
      <a href="index.html" class="btn btn-ghost">Volver</a>
      <span id="userNombre" class="user-email header-user"></span>
      <button id="btnLogout" class="btn-logout">Salir</button>
    </div>
    <button class="menu-toggle" id="menuToggle">Menu</button>
  </div>
</header>

<main id="perfilMain" style="max-width:900px;margin:2rem auto;padding:0 1.5rem">
  <p style="color:var(--text2)">Cargando perfil...</p>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:            "AIzaSyC_DVPcMOJQNLsKXRg9vTNISQaOHGqYYrs",
  authDomain:        "clm-iglesia-app.firebaseapp.com",
  projectId:         "clm-iglesia-app",
  storageBucket:     "clm-iglesia-app.firebasestorage.app",
  messagingSenderId: "385996661780",
  appId:             "1:385996661780:web:e7507f97757e215718b301"
});

var db   = firebase.firestore();
var auth = firebase.auth();

function showLoader(t) {
  document.getElementById("loaderTxt").textContent = t || "Cargando...";
  document.getElementById("loaderOverlay").classList.add("active");
}
function hideLoader() {
  document.getElementById("loaderOverlay").classList.remove("active");
}
function fmtDate(d) {
  if (!d) return "-";
  var p = d.split("-");
  return p[2] + "/" + p[1] + "/" + p[0];
}
function calcAge(dob) {
  if (!dob) return "-";
  var p = dob.split("-").map(Number);
  var n = new Date();
  var a = n.getFullYear() - p[0];
  if (n < new Date(n.getFullYear(), p[1]-1, p[2])) a--;
  return a;
}
function initials(name) {
  return (name || "?").split(" ").slice(0,2).map(function(w){ return w[0] || "?"; }).join("").toUpperCase();
}

var memberId = new URLSearchParams(location.search).get("id");
var mainEl   = document.getElementById("perfilMain");
var miembroGlobal = null;

if (!memberId) {
  document.body.classList.add("auth-ok");
  mainEl.innerHTML = "<p>ID no encontrado. <a href='index.html'>Volver</a></p>";
}

auth.onAuthStateChanged(async function(user) {
  if (!user) { window.location.href = "login.html"; return; }
  if (!memberId) return;

  // ── Obtener rol ──
  var rol = "colaborador", nombre = user.email.split("@")[0];
  try {
    var usnap = await db.collection("usuarios").doc(user.uid).get();
    if (usnap.exists) {
      rol    = usnap.data().rol    || "colaborador";
      nombre = usnap.data().nombre || nombre;
    }
  } catch(e) {}

  if (rol === "finanzas") { window.location.href = "finanzas.html"; return; }

  document.body.classList.add("auth-ok");
  document.getElementById("userNombre").textContent = "👤 " + nombre;

  // Mostrar/ocultar nav según rol
  if (rol === "admin") {
    document.querySelectorAll(".finanzas-link").forEach(function(a){ a.classList.add("rol-visible"); });
    document.querySelectorAll(".usuarios-link").forEach(function(a){ a.classList.add("rol-visible"); });
  } else {
    document.querySelectorAll(".finanzas-link,.usuarios-link").forEach(function(a){ a.style.display="none"; });
  }

  document.getElementById("btnLogout").onclick = function() {
    if (confirm("Cerrar sesion?")) auth.signOut().then(function(){ window.location.href = "login.html"; });
  };
  document.getElementById("menuToggle").onclick = function() {
    document.getElementById("headerNav").classList.toggle("open");
  };

  showLoader("Cargando perfil...");
  db.collection("miembros").doc(memberId).get().then(function(docSnap) {
    hideLoader();
    if (!docSnap.exists) {
      mainEl.innerHTML = "<p>Miembro no encontrado. <a href='index.html'>Volver</a></p>";
      return;
    }
    miembroGlobal = docSnap.data();
    mostrarPerfil(miembroGlobal, rol);
  }).catch(function(err) {
    hideLoader();
    mainEl.innerHTML = "<p>Error: " + err.message + "</p>";
  });
});

// ══════════════════════════════════════
//  MOSTRAR PERFIL
// ══════════════════════════════════════
function mostrarPerfil(m, rol) {
  var age = calcAge(m.fechaNacimiento);
  var est = (m.estado || "activo").toLowerCase();

  // ── HERO ──
  var hero = document.createElement("div");
  hero.className = "perfil-hero";

  // Foto
  var fotoWrap = document.createElement("div");
  fotoWrap.className = "perfil-foto";
  if (m.fotoUrl) {
    var img = document.createElement("img");
    img.className = "perfil-foto-img"; img.alt = "foto"; img.src = m.fotoUrl;
    fotoWrap.appendChild(img);
  } else {
    var ini = document.createElement("div");
    ini.className = "perfil-foto-initials"; ini.textContent = initials(m.nombre);
    fotoWrap.appendChild(ini);
  }
  hero.appendChild(fotoWrap);

  // Info
  var info = document.createElement("div");
  info.className = "perfil-hero-info";
  var h1 = document.createElement("h1"); h1.textContent = m.nombre || "-";
  info.appendChild(h1);
  var badges = document.createElement("div"); badges.className = "perfil-badges";
  var b1 = document.createElement("span"); b1.className = "badge badge--ministerio"; b1.textContent = m.ministerio || "Congregante";
  var b2 = document.createElement("span"); b2.className = "badge badge--estado badge--" + est; b2.textContent = m.estado || "Activo";
  badges.appendChild(b1); badges.appendChild(b2); info.appendChild(badges);
  var meta = document.createElement("div"); meta.className = "perfil-hero-meta";
  var s1 = document.createElement("span"); s1.textContent = "📍 " + (m.residencia || "-");
  var s2 = document.createElement("span"); s2.textContent = "👤 " + age + " anos";
  var s3 = document.createElement("span"); s3.textContent = "🎂 " + fmtDate(m.fechaNacimiento);
  meta.appendChild(s1); meta.appendChild(s2); meta.appendChild(s3);
  info.appendChild(meta);
  hero.appendChild(info);

  // Botones
  var actions = document.createElement("div");
  actions.className = "perfil-hero-actions";

  // Descargar PDF — siempre visible
  var btnPDF = document.createElement("button");
  btnPDF.className = "btn btn-primary";
  btnPDF.textContent = "📄 Descargar PDF";
  btnPDF.onclick = function() { descargarPDF(m); };
  actions.appendChild(btnPDF);

  hero.appendChild(actions);
  mainEl.innerHTML = "";
  mainEl.appendChild(hero);

  // ── GRID INFO ──
  var grid = document.createElement("div");
  grid.className = "perfil-grid";
  grid.appendChild(crearSeccion("Informacion Personal", [
    ["Nombre",     m.nombre],
    ["Nacimiento", fmtDate(m.fechaNacimiento)],
    ["Edad",       age + " anos"],
    ["Genero",     m.genero],
    ["Residencia", m.residencia],
    ["Telefono",   m.telefono],
    ["Correo",     m.correo],
    ["Familia",    m.familia]
  ]));
  grid.appendChild(crearSeccion("Membresia", [
    ["Estado",          m.estado],
    ["Ministerio",      m.ministerio],
    ["Bautismo",        fmtDate(m.fechaBautismo)],
    ["Membresia desde", fmtDate(m.fechaMembresia)],
    ["Registrado",      m.creadoEn ? new Date(m.creadoEn).toLocaleDateString("es-PE") : "-"]
  ]));
  grid.appendChild(crearSeccion("Contacto de Emergencia", [
    ["Contacto", m.contactoEmergencia],
    ["Telefono", m.telefonoEmergencia]
  ]));
  mainEl.appendChild(grid);
}

function crearSeccion(titulo, filas) {
  var sec = document.createElement("div");
  sec.className = "perfil-section";
  var h3 = document.createElement("h3"); h3.className = "section-title"; h3.textContent = titulo;
  sec.appendChild(h3);
  var list = document.createElement("div"); list.className = "detail-list";
  filas.forEach(function(f) {
    var div = document.createElement("div"); div.className = "detail-row";
    var lbl = document.createElement("span"); lbl.className = "lbl"; lbl.textContent = f[0];
    var val = document.createElement("span"); val.textContent = f[1] || "-";
    div.appendChild(lbl); div.appendChild(val); list.appendChild(div);
  });
  sec.appendChild(list);
  return sec;
}

// ══════════════════════════════════════
//  DESCARGAR PDF con jsPDF
// ══════════════════════════════════════
function descargarPDF(m) {
  var doc = new window.jspdf.jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

  var gold  = [201, 168, 76];
  var dark  = [30, 30, 40];
  var grey  = [100, 110, 120];
  var light = [245, 245, 248];
  var w = 210, margin = 18;

  // ── FONDO HEADER ──
  doc.setFillColor(13, 17, 23);
  doc.rect(0, 0, w, 42, "F");

  // Línea dorada
  doc.setFillColor(gold[0], gold[1], gold[2]);
  doc.rect(0, 42, w, 1.2, "F");

  // Título iglesia
  doc.setTextColor(gold[0], gold[1], gold[2]);
  doc.setFontSize(16); doc.setFont("helvetica", "bold");
  doc.text("CLM Puente Piedra", margin, 16);

  doc.setTextColor(180, 180, 190);
  doc.setFontSize(8); doc.setFont("helvetica", "normal");
  doc.text("BASE DE DATOS DE LA IGLESIA", margin, 22);

  // Nombre del miembro
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(18); doc.setFont("helvetica", "bold");
  doc.text(m.nombre || "-", margin, 34);

  // Ministerio badge
  var min = m.ministerio || "Congregante";
  doc.setFillColor(gold[0], gold[1], gold[2]);
  doc.roundedRect(w - margin - (min.length * 2.2) - 6, 27, (min.length * 2.2) + 6, 7, 2, 2, "F");
  doc.setTextColor(13, 17, 23);
  doc.setFontSize(8); doc.setFont("helvetica", "bold");
  doc.text(min, w - margin - (min.length * 2.2) - 3, 32.5);

  var y = 52;

  // ── SECCIÓN 1: INFO PERSONAL ──
  y = dibujarSeccion(doc, "INFORMACION PERSONAL", [
    ["Nombre completo", m.nombre],
    ["Fecha de nacimiento", fmtDate(m.fechaNacimiento)],
    ["Edad", calcAge(m.fechaNacimiento) + " anos"],
    ["Genero", m.genero],
    ["Residencia", m.residencia],
    ["Telefono", m.telefono],
    ["Correo electronico", m.correo],
    ["Familia", m.familia]
  ], y, margin, w, gold, light, grey, dark);

  // ── SECCIÓN 2: MEMBRESÍA ──
  y = dibujarSeccion(doc, "MEMBRESIA EN LA IGLESIA", [
    ["Estado", m.estado],
    ["Ministerio / Area", m.ministerio],
    ["Fecha de bautismo", fmtDate(m.fechaBautismo)],
    ["Miembro desde", fmtDate(m.fechaMembresia)],
    ["Fecha de registro", m.creadoEn ? new Date(m.creadoEn).toLocaleDateString("es-PE") : "-"]
  ], y, margin, w, gold, light, grey, dark);

  // ── SECCIÓN 3: EMERGENCIA ──
  y = dibujarSeccion(doc, "CONTACTO DE EMERGENCIA", [
    ["Contacto", m.contactoEmergencia],
    ["Telefono de emergencia", m.telefonoEmergencia]
  ], y, margin, w, gold, light, grey, dark);

  // ── FOOTER ──
  var hoy = new Date().toLocaleDateString("es-PE");
  doc.setDrawColor(gold[0], gold[1], gold[2]);
  doc.setLineWidth(0.4);
  doc.line(margin, 282, w - margin, 282);
  doc.setTextColor(grey[0], grey[1], grey[2]);
  doc.setFontSize(7); doc.setFont("helvetica", "normal");
  doc.text("Generado por CLM Puente Piedra  •  " + hoy, margin, 287);
  doc.text("Developed by Davj Studio", w - margin, 287, { align: "right" });

  // ── DESCARGAR ──
  var nombreArchivo = "Ficha_" + (m.nombre || "miembro").replace(/\s+/g, "_") + ".pdf";
  doc.save(nombreArchivo);
}

function dibujarSeccion(doc, titulo, filas, y, margin, w, gold, light, grey, dark) {
  // Título sección
  doc.setFillColor(gold[0], gold[1], gold[2]);
  doc.rect(margin, y, 3, 6, "F");
  doc.setTextColor(dark[0], dark[1], dark[2]);
  doc.setFontSize(9); doc.setFont("helvetica", "bold");
  doc.text(titulo, margin + 6, y + 4.5);
  y += 10;

  filas.forEach(function(f, i) {
    var label = f[0] || "";
    var valor = f[1] || "-";
    if (i % 2 === 0) {
      doc.setFillColor(light[0], light[1], light[2]);
      doc.rect(margin, y - 1, w - margin * 2, 7.5, "F");
    }
    doc.setTextColor(grey[0], grey[1], grey[2]);
    doc.setFontSize(7.5); doc.setFont("helvetica", "bold");
    doc.text(label, margin + 3, y + 4);
    doc.setTextColor(dark[0], dark[1], dark[2]);
    doc.setFont("helvetica", "normal");
    doc.text(String(valor), margin + 65, y + 4);
    y += 7.5;
  });

  return y + 6;
}
</script>
</body>
</html>
